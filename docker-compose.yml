# ─────────────────────────────────────────────────────────────
#  PollCraft – Docker Compose
#
#  Development  →  docker-compose up
#  Production   →  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# ─────────────────────────────────────────────────────────────

version: '3.9'

# ── Shared network ────────────────────────────────────────────
networks:
  poll_network:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Services ──────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: poll_postgres
    restart: unless-stopped
    networks:
      - poll_network
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-polluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pollpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-polldb}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run schema on first boot (idempotent – uses IF NOT EXISTS)
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-polluser} -d ${POSTGRES_DB:-polldb}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development          # override to "production" in prod compose
    container_name: poll_backend
    restart: unless-stopped
    networks:
      - poll_network
    environment:
      NODE_ENV:      ${NODE_ENV:-development}
      PORT:          ${BACKEND_PORT:-5000}
      DATABASE_URL:  postgresql://${POSTGRES_USER:-polluser}:${POSTGRES_PASSWORD:-pollpassword}@postgres:5432/${POSTGRES_DB:-polldb}
      JWT_SECRET:    ${JWT_SECRET:-supersecretjwtkey_changeme_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Hot-reload: mount source in dev only
      - ./backend/src:/app/src:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      # Prevent host node_modules from overwriting container's
      - /app/node_modules

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development          # override to "production" in prod compose
      args:
        VITE_API_URL:    ${VITE_API_URL:-http://localhost:5000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
        VITE_HOST_IP:    ${VITE_HOST_IP:-}
    container_name: poll_frontend
    restart: unless-stopped
    networks:
      - poll_network
    environment:
      VITE_API_URL:    ${VITE_API_URL:-http://localhost:5000/api}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
      VITE_HOST_IP:    ${VITE_HOST_IP:-}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend
    volumes:
      # Hot-reload in dev
      - ./frontend/src:/app/src:delegated
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - /app/node_modules
